name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: |
          # Set public URL for GitHub Pages
          export PUBLIC_URL="${{ github.event.repository.name }}"
          npm run build

      - name: Create static API data
        run: |
          # Create a static data file with default stocks
          mkdir -p build/api
          cat > build/api/stocks.json << 'EOF'
          [
            {"key":"7974","code":"7974.T","name":"Nintendo Co., Ltd.","exchange":"Tokyo Stock Exchange"},
            {"key":"4784","code":"4784.T","name":"GREAT TOYS","exchange":"Tokyo Stock Exchange"},
            {"key":"9501","code":"9501.T","name":"Tokyo Electric Power Company","exchange":"Tokyo Stock Exchange"}
          ]
          EOF

      - name: Add client-side routing support
        run: |
          # Copy index.html to 404.html for SPA routing
          cp build/index.html build/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './build'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
